<!doctype html>
<html lang="en" data-theme="light ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- Tailwind+DaisyUI CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Remix Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-[28.125rem] mx-auto bg-base-200">
    <header class="border-b-2 border-neutral-100 py-3 sticky top-0 z-10 glass">
      <section class="mx-6 flex justify-between items-center">
        <div class="flex gap-2">
          <img class="w-[3.75rem]" src="./assets/logo.png" alt="" />
          <div class="Left">
            <h2
              class="font-extrabold text-[1.125rem] text-[#080808] opacity-90"
            >
              $ <span id="balance">45000</span>
            </h2>
            <p class="font-normal text-[.875rem] text-[#080808] opacity-50">
              Available Balance
            </p>
          </div>
        </div>
        <div class="Right">
          <a
            href="./index.html"
            class="btn btn-error btn-soft hover:text-base-200 rounded-[.5rem] font-normal text-[.875rem] border-neutral-400 text-opacity-40 text-[#080808]"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="currentColor"
            >
              <path
                d="M4 18H6V20H18V4H6V6H4V3C4 2.44772 4.44772 2 5 2H19C19.5523 2 20 2.44772 20 3V21C20 21.5523 19.5523 22 19 22H5C4.44772 22 4 21.5523 4 21V18ZM6 11H13V13H6V16L1 12L6 8V11Z"
              ></path>
            </svg>
            Log out
          </a>
        </div>
      </section>
    </header>
    <main class="mx-6">
      <section
        class="dashboard pb-6 pt-8 rounded-bl-[1.5rem] rounded-br-[1.5rem]"
      >
        <div class="dashboard-text space-y-3">
          <h2 class="font-bold text-[1.5rem]/[125%] text-[#080808]">
            Welcome to Pay<span class="text-[#7460FF]">oo</span>
          </h2>
          <p class="font-normal text-[1rem] text-[#080808]/50">
            Enjoy easy and convenient financial services with us. <br />
            Cashout charge is low and
          </p>
        </div>
        <div class="dashboard-cards grid grid-cols-3 gap-[1.0313rem] mt-6">
          <button
            class="btn px-[1.625rem] py-5 flex-col h-full rounded-[.75rem] btn-primary btn-soft"
          >
            <img class="" src="./assets/opt-1.png" alt="" />
            <p class="">Add Money</p>
          </button>
          <button
            class="btn px-[1.625rem] py-5 flex-col h-full rounded-[.75rem] btn-primary btn-soft"
          >
            <img class="" src="./assets/opt-2.png" alt="" />
            <p class="">Cashout</p>
          </button>
          <button
            class="btn px-[1.625rem] py-5 flex-col h-full rounded-[.75rem] btn-primary btn-soft"
          >
            <img class="" src="./assets/opt-3.png" alt="" />
            <p class="">Transfer Money</p>
          </button>
          <button
            class="btn px-[1.625rem] py-5 flex-col h-full rounded-[.75rem] btn-primary btn-soft"
          >
            <img class="" src="./assets/opt-4.png" alt="" />
            <p class="">Get Bonus</p>
          </button>
          <button
            class="btn px-[1.625rem] py-5 flex-col h-full rounded-[.75rem] btn-primary btn-soft"
          >
            <img class="" src="./assets/opt-5.png" alt="" />
            <p class="">Pay Bill</p>
          </button>
          <button
            class="btn px-[1.625rem] py-5 flex-col h-full rounded-[.75rem] btn-primary btn-soft"
          >
            <img class="" src="./assets/opt-6.png" alt="" />
            <p class="">Transactions</p>
          </button>
        </div>
      </section>
      <section id="addMoney" class="py-5 space-y-4">
        <h2 class="font-semibold text-[1.125rem]">Add Money</h2>
        <div class="card bg-base-100 w-full rounded-3xl">
          <div class="card-body">
            <fieldset class="fieldset space-y-4">
              <div class="space-y-[.75rem]">
                <label
                  class="label font-semibold text-[1rem] text-[#080808] opacity-70"
                  >Select A Bank</label
                >

                <select
                  id="add-money-bank"
                  class="select w-full rounded-[2rem] border-none bg-[#f4f5f7] outline-none font-light text-[1rem] text-nutral text-opacity-40"
                >
                  <option disabled selected>Select Bank</option>
                  <option value="EBL">EBL</option>
                  <option value="DBBL">DBBL</option>
                  <option value="City Bank">City Bank</option>
                </select>

                <label
                  class="label font-semibold text-[1rem] text-[#080808] opacity-70"
                  >Bank Account Number</label
                >
                <input
                  id="add-money-number"
                  value="01630591092"
                  maxlength="11"
                  minlength="11"
                  type="tel"
                  class="input rounded-[2rem] border-none bg-[#f4f5f7] placeholder-opacity-40 font-light text-[1rem] text-nutral outline-none w-full py-4 pl-[1.25rem]"
                  placeholder="Enter 11 digit number"
                  required
                />
              </div>
              <div class="space-y-[.75rem]">
                <label
                  class="label font-semibold text-[1rem] text-[#080808] opacity-70"
                  >Amount to Add</label
                >
                <input
                  id="add-money-amount"
                  type="number"
                  class="input rounded-[2rem] border-none bg-[#f4f5f7] placeholder-opacity-40 font-light text-[1rem] text-nutral outline-none w-full"
                  placeholder="Enter amount to withdraw"
                  required
                />
              </div>
              <div class="space-y-[.75rem]">
                <label
                  class="label font-semibold text-[1rem] text-[#080808] opacity-70"
                  >Pin Number</label
                >
                <input
                  id="add-money-pin"
                  maxlength="4"
                  minlength="4"
                  type="password"
                  class="input rounded-[2rem] border-none bg-[#f4f5f7] placeholder-opacity-40 font-light text-[1rem] text-nutral outline-none w-full"
                  placeholder="Enter 4 digit pin number"
                  required
                />
              </div>
              <button
                id="add-money-btn"
                class="btn btn-primary mt-4 rounded-[2rem] font-semibold text-[1.25rem] text-center py-[.875rem] h-[3.3125rem]"
              >
                Add Money
              </button>
            </fieldset>
          </div>
        </div>
      </section>
      <section id="cashout" class="py-5 space-y-4 hidden">
        <h2 class="font-semibold text-[1.125rem]">Cash Out</h2>
        <div class="card bg-base-100 w-full rounded-3xl">
          <div class="card-body">
            <fieldset class="fieldset space-y-4">
              <div class="space-y-[.75rem]">
                <label
                  class="label font-semibold text-[1rem] text-[#080808] opacity-70"
                  >Agent Number</label
                >
                <input
                  id="input-agent"
                  maxlength="11"
                  minlength="11"
                  type="tel"
                  class="input rounded-[2rem] border-none bg-[#f4f5f7] placeholder-opacity-40 font-light text-[1rem] text-nutral outline-none w-full py-4 pl-[1.25rem]"
                  placeholder="Enter 11 digit number"
                  required
                />
              </div>
              <div class="space-y-[.75rem]">
                <label
                  class="label font-semibold text-[1rem] text-[#080808] opacity-70"
                  >Amount</label
                >
                <input
                  id="input-amount"
                  type="number"
                  class="input rounded-[2rem] border-none bg-[#f4f5f7] placeholder-opacity-40 font-light text-[1rem] text-nutral outline-none w-full"
                  placeholder="Enter amount to withdraw"
                  required
                />
              </div>
              <div class="space-y-[.75rem]">
                <label
                  class="label font-semibold text-[1rem] text-[#080808] opacity-70"
                  >Pin Number</label
                >
                <input
                  id="input-cashout-pin"
                  maxlength="4"
                  minlength="4"
                  type="password"
                  class="input rounded-[2rem] border-none bg-[#f4f5f7] placeholder-opacity-40 font-light text-[1rem] text-nutral outline-none w-full"
                  placeholder="Enter 4 digit pin number"
                  required
                />
              </div>
              <button
                id="withdraw-btn"
                class="btn btn-primary mt-4 rounded-[2rem] font-semibold text-[1.25rem] text-center py-[.875rem] h-[3.3125rem]"
              >
                Withdraw Money
              </button>
            </fieldset>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./JS/cashout.js"></script>
  </body>
</html>
