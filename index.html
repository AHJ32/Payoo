<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- Tailwind+DaisyUI CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Remix Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-[28.125rem] mx-auto bg-base-200">
    <div class="logo pt-[13.125rem] px-[5.875rem]">
      <img src="./assets/Logo-full.png" alt="" />
    </div>
    <div class="login-form pt-8">
      <div
        class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto rounded-3xl"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-medium text-4 text-nutral"
              >Mobile Number</label
            >
            <input
              id="input-mobile"
              value="01630591092"
              maxlength="11"
              minlength="11"
              type="tel"
              class="input rounded-[2rem] border-none bg-[#f4f5f7] placeholder-opacity-40 font-light text-4 text-nutral outline-none w-full"
              placeholder="Enter your number"
            />
            <label class="label font-medium text-4 text-nutral"
              >4 Digit Pin</label
            >
            <input
              id="input-pin"
              maxlength="4"
              minlength="4"
              type="password"
              class="input rounded-[2rem] border-none bg-[#f4f5f7] placeholder-opacity-40 font-light text-4 text-nutral outline-none w-full"
              placeholder="Enter 4 Digit Pin"
            />
            <button id="login-btn" class="btn btn-primary mt-4 rounded-[2rem]">
              Login
            </button>
          </fieldset>
        </div>
      </div>
    </div>
    <script src="./JS/login.js"></script>
  </body>
</html>
